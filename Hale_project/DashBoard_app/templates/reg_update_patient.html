<div class="grid1">

    <script>
        alert('{{msg}}');

        <!-- <h3 style="color: red;">{{msg}}</h3> -->
           
    <div id="popup_window">
        <form action="" method="post" >
            {% csrf_token %}
            
            <table cellpadding="20px" >
                <tr>
                    
                <th><pre>Name:  <input type="text" name="hname"value="{{data.patient_name}}"></pre>   </th>
                <th><pre>Age:  <input type="number" name="hage"value="{{data.patient_age}}"></pre>   </th>
                <th>
                    <label for="gender">Gender: &nbsp</label>
                    <input type="radio" id="male" name="hgender" value="male" {% if data.patient_gender == 'male' %}checked{% endif %} required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="hgender" value="Female" {% if data.patient_gender == 'Female' %}checked{% endif %} required>
                    <label for="female">Female</label>

            
                    </th>
                    <tr>

                        <th><pre><label for="">PhoneNumber: </label> <input type="number" name="hphone_no" id=""value="{{data.patient_phone}}"></pre></th>
                        <th > 
                            <textarea rows= "4" cols="40" name="haddress" placeholder="enter Address" >{{data.patient_address}}</textarea></th>
                        
                    <th > 
                    <textarea rows= "4" cols="40" name="hdiscription" placeholder="enter disciption" >{{data.patient_discription}}</textarea></th>
                    </tr>
                <tr>

                    <th><pre><button type="submit" >Save</button>   <a href="reg_update"><button type="button">Cancel</button></a></pre></th>
                    
                </tr>
